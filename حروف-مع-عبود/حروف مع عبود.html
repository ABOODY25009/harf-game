<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الحروف - نسخة المتصفح</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --hex-idle: #1e293b;
            --hex-active: #fbbf24; /* أصفر عزيز */
            --text-light: #f8fafc;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 90px);
            gap: 15px;
            margin-top: 50px;
        }

        .hexagon {
            width: 100px;
            height: 110px;
            background-color: var(--hex-idle);
            display: flex;
            justify-content: center;
            align-items: center;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.8rem;
            font-weight: bold;
            border: none;
        }

        .hexagon:hover { transform: scale(1.1); filter: brightness(1.5); }
        .hexagon.correct { background-color: var(--hex-active); color: #000; box-shadow: 0 0 20px var(--hex-active); }

        /* نافذة السؤال */
        #modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #ffffff;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 400px;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 99;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1rem;
            text-align: center;
        }

        button {
            padding: 10px 25px;
            background: var(--hex-active);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>لعبة الحروف 🧩</h1>
    <p>اختر حرفاً وأجب عن السؤال!</p>

    <div class="grid" id="gameGrid"></div>

    <div id="overlay"></div>
    <div id="modal">
        <h2 id="modalTitle">سؤال حرف ( )</h2>
        <p id="questionText">جاري التحميل...</p>
        <input type="text" id="answerInput" placeholder="اكتب الإجابة هنا...">
        <br>
        <button onclick="checkAnswer()">تحقق</button>
    </div>

<script>
    // قاعدة بيانات بسيطة للأسئلة
    const gameData = {
        'أ': { q: "أكبر مدينة في السعودية؟", a: "الرياض" },
        'ب': { q: "فاكهة تحبها القرود؟", a: "موز" }, // ستلاحظ أن الحرف الأول لا يشترط أن يكون ب، يمكنك تعديل الإجابات
        'م': { q: "أقدس مدينة في الإسلام؟", a: "مكة" },
        'ج': { q: "حيوان يسمى سفينة الصحراء؟", a: "جمل" },
        'د': { q: "حيوان منقرض ضخم؟", a: "ديناصور" }
    };

    const grid = document.getElementById('gameGrid');
    const modal = document.getElementById('modal');
    const overlay = document.getElementById('overlay');
    let currentHex = null;

    // إنشاء الشبكة
    Object.keys(gameData).forEach(char => {
        const hex = document.createElement('div');
        hex.className = 'hexagon';
        hex.innerText = char;
        hex.onclick = () => showQuestion(char, hex);
        grid.appendChild(hex);
    });

    function showQuestion(char, element) {
        currentHex = element;
        document.getElementById('modalTitle').innerText = `سؤال حرف (${char})`;
        document.getElementById('questionText').innerText = gameData[char].q;
        document.getElementById('answerInput').value = "";
        modal.style.display = 'block';
        overlay.style.display = 'block';
        document.getElementById('answerInput').focus();
    }

    function checkAnswer() {
        const char = currentHex.innerText;
        const userAnswer = document.getElementById('answerInput').value.trim();
        
        if (userAnswer === gameData[char].a) {
            currentHex.classList.add('correct');
            alert("إجابة صحيحة! 🎉");
            closeModal();
        } else {
            alert("خطأ! حاول مرة أخرى.");
        }
    }

    function closeModal() {
        modal.style.display = 'none';
        overlay.style.display = 'none';
    }

    overlay.onclick = closeModal;
</script>

</body>
</html>
